<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07111f;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #0b1729;
      border: 1px solid #16253f;
      border-radius: 16px;
      padding: 40px 32px;
      width: 360px;
      text-align: center;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .logo span { color: #7F77DD; }
    .tagline {
      font-size: 13px;
      color: #7d8ca3;
      margin-bottom: 32px;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #7d8ca3;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #16253f;
    }
    .google-btn {
      width: 100%;
      padding: 12px;
      background: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    .google-btn:hover { background: #f0f0f0; }
    .email-section { text-align: left; }
    .label {
      font-size: 11px;
      color: #7d8ca3;
      margin-bottom: 5px;
      display: block;
    }
    .input {
      width: 100%;
      background: #16253f;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 10px 12px;
      color: #cbd5e1;
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
    }
    .input:focus { border-color: #7F77DD; }
    .submit-btn {
      width: 100%;
      padding: 11px;
      background: #7F77DD;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .submit-btn:hover { background: #6c64c7; }
    .toggle-mode {
      font-size: 12px;
      color: #7d8ca3;
      margin-top: 14px;
    }
    .toggle-mode a {
      color: #7F77DD;
      cursor: pointer;
      text-decoration: none;
    }
    .msg {
      font-size: 12px;
      padding: 10px;
      border-radius: 6px;
      margin-top: 12px;
      display: none;
    }
    .msg.error { background: #3d1a0f; color: #fca5a5; display: block; }
    .msg.success { background: #0f3d2e; color: #4eca9a; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>Study</span>OS</div>
    <div class="tagline">Your all-in-one student productivity app</div>

    <!-- Google Login -->
    <button class="google-btn" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <!-- Email Login -->
    <div class="email-section">
      <label class="label">Email</label>
      <input class="input" id="email" type="email" placeholder="your@email.com">
      <label class="label">Password</label>
      <input class="input" id="password" type="password" placeholder="••••••••">
      <button class="submit-btn" id="submit-btn">Sign in</button>
      <div class="toggle-mode">
        Don't have an account? <a id="toggle-link">Sign up</a>
      </div>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qvzfumruwhbpzetslsjo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_CnEPDGz4KDvSnpFAFnxZqQ_581Xj6DB';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let isSignUp = false;

    // Check if already logged in
    sb.auth.getUser().then(({ data: { user } }) => {
      if (user) window.location.href = '/index.html';
    });

    // Google OAuth
    document.getElementById('google-btn').addEventListener('click', async () => {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/index.html' }
      });
      if (error) showMsg(error.message, 'error');
    });

    // Email auth
    document.getElementById('submit-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showMsg('Please fill in all fields.', 'error'); return; }

      let result;
      if (isSignUp) {
        result = await sb.auth.signUp({ email, password });
        if (!result.error) showMsg('Check your email to confirm your account!', 'success');
      } else {
        result = await sb.auth.signInWithPassword({ email, password });
        if (!result.error) window.location.href = '/index.html';
      }
      if (result.error) showMsg(result.error.message, 'error');
    });

    // Toggle sign in / sign up
    document.getElementById('toggle-link').addEventListener('click', () => {
      isSignUp = !isSignUp;
      document.getElementById('submit-btn').textContent = isSignUp ? 'Sign up' : 'Sign in';
      document.getElementById('toggle-link').textContent = isSignUp ? 'Sign in instead' : 'Sign up';
      document.querySelector('.toggle-mode').firstChild.textContent = isSignUp ? 'Already have an account? ' : "Don't have an account? ";
    });

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    // Enter key
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('submit-btn').click();
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
